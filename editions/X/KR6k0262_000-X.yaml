  text: 戒殺四十八問目錄釋生物養人之疑五問釋俗見斷殺之疑六問釋業重難救之疑五問釋葷血禱神之疑三問釋享親祭祖之疑四問釋宴賓違俗之疑一問釋古聖教殺之疑二問釋仁民愛物之疑二問釋因果差別之疑六問釋惡業有無之疑四問釋持齋斷肉之疑七問釋佛理難信之疑三問
