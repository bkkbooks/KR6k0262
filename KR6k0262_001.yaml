body:
  text: 崑山周思仁述嗚呼殺劫之來亦慘矣哉其在人道或數十年或百餘年方一見在畜生道則無日不見一遇雞鳴即有無限狠心屠戶執利刃向羣畜奮然捆縛羣畜自知不免大聲躑跳動地驚天救援不至各各被人面羅剎抽腸拔肺哀聲未斷又投沸湯受大苦惱片刻間億萬生靈身首處嗚呼彼獨不畏殺乎受制於人憤憤而死冤無可伸而為戾氣戾氣一聚而諸天魔王遂出世而了此案矣慈受禪師偈云世上多殺生遂有刀兵劫負命殺汝身缺財焚汝宅離散汝妻子曾破他巢穴報應各相當洗耳聽佛說由此觀之殺劫之來皆人人殺業之所召也則夫臨殺劫而思所以逃之者惟以戒殺轉之其機最捷其感最神他善敵不過也余故作戒殺問答一卷釋人之疑而堅人之信所願大地衆生於過去殺業念佛超薦未來殺業當下斷除發大慈悲發大堅忍誓不故殺一微細生命如此而猶慮殺劫之不能逃也八部金剛截我頭去釋生物養人之疑五問客曰書云惟天地萬物父母惟人萬物之靈天生異類本為養人禁之不殺何為答曰既知天地為萬物之父母當知萬物為天地之赤子赤子中有強凌弱貴欺賤者父母亦大不樂矣倘因食其肉遂謂天之所以養我則虎豹蚊虻亦食人類血肉將天之生人又為蚊虻虎豹耶客曰然則天何以不顯示其報而禁人之殺答曰天固禁之故纍示殺報特愚人不知而蹈之智者知之而故蹈天無如何也咸豐某年全椒縣居民某夜臥夢神戒曰兵旦夕至不戒殺斷難逃死陳驚醒率合家大小焚香發誓永斷殺業人皆從之惟一婦曰此夢耳何足信不數日兵至一家逃出此婦以戀家故出稍遲遂被殺余親見之蓮西居士附識客曰天下物類甚多人人戒殺則生生不已將成禽獸世界奈何答曰蚯蚓蟲蛇人所不食者也豈見充滿天下乎況世間禽獸之多正因殺禽獸者之多也冤冤相報互為畜生則成禽獸世界若人人戒殺則物類業報漸消必且人天增盛矣楚不捕蛙而蛙反少蜀不食蟹而蟹自稀非明驗乎客曰天既惡殺當使血肉之味臭惡難堪則普天之下自然戒殺不亦善乎答曰禽獸血肉自天視之原係臭惡難堪世人食之見為美者亦猶廁蟲貪糞習而不覺也譬如有人前世為猫念念捕鼠前世為鶴念念吞蛇今世為人不復思此二物可見一種形骸一種嗜好嗜好不同從業緣起業緣不同又從心起人能與天同其心自覺血肉之味臭惡難堪也客曰殺生為業者仰事俯畜咸賴乎此勸之改業絶其生路矣愛物不愛人吾不取也答曰殺生為業譬之漏脯救飢雖暫得衣食而纍劫受苦未有了期也正為愛之故勸之改業反謂絶其生路世之不殺生為業者竟死乎弗思而已釋俗見斷殺之疑六問客曰牛可耕田犬可守夜固當憐之豬羊一無所能不食何用答曰戒殺放生不過自全其惻隱耳豈因物之有用無用哉因有用而不食仍然自私之念矣甚矣性蔽於習愛起於貪也客曰雞犬牛羊皆哀鳴畏死殺之固所不忍微細水族殺之無聲淚者安用戒為答曰形有大小性無大小譬如殺人殺老者與嬰兒其罪同也若謂無聲淚者殺之不痛試於啞子就戮時察之客曰摻刀自割固害慈心若自人殺之而我食之有何不可答曰此掩耳盜鈴也若謂自人殺之即可嫁禍於人則屈受官刑者但當怨隸人不當怨官長矣噫物類可欺自心可欺耶客曰放生固屬善舉但所放之物被人捕取奈何答曰捕者自捕放者自放耳譬如良醫療病不能保將來之不死譬如凶年設粥不能保後日之不飢世間萬事皆然何獨于放生而疑之且子又安知所放之物盡為人捕而無一生乎客曰行善以立心為主心苟善矣何須戒殺答曰何哉爾所謂善心者為口腹之娛使物類受彌天之苦天下凶毒心莫此為甚矣試問善心更在何處孟子曰人也者仁也仁則不殺殺則不仁天下斷無好殺之仁人也客曰吾則無可無不可非戒殺非不戒殺置之無心而已答曰無心戒之未必有功無心殺之何能無罪譬如寇盜劫掠他家飛矢誤中於汝汝能諒其無心乎釋業重難救之疑五問客曰物類烹割彼罪難逃我縱不殺必有殺之者殺之何害答曰物罪固不可逃矣己罪獨不可逃乎因物罪不可逃而殺之與彼同受不可逃之罪矣相噉相殺理有必然人奈何處可逃之地不思早自逃乎客曰世間物命類多缺債殺之何罪答曰物命償債豈不誠然但有對受殺果不對受殺果之分耳對受殺果者前世彼曾殺我今冤對相逢理當償我也不對受殺果者前世他人曾被其殺今業報雖至不當酬我也世人一宴之頃牲肴數品一臠之肉細命百千安得盡取對受者而殺之竊恐取償于前世者手中希得一二而借債於來生者比比然也客曰不對受者殺之固當有報若對受者一往一來殺報已盡庸何傷乎答曰子不見市人相毆乎此以杖來彼以杖往兩拳迭下如雨曾見一往一來之後各各斂手平心乎菩薩于未來因緣洞若觀火所以遇冤讐而不報也客曰佛言有生之屬或多宿世父母六親有何證據而作此說答曰六道衆生無量劫來輪回不已即以一劫論其數無量安見目前有生之屬與己無關耶余曾見劉道源為蓬溪令解官歸宿秦氏家夢一婦泣曰吾乃秦之妻也因埵殺一婢冥官處我以死仍罰為羊今現在欄中明日將殺以享君矣劉急白之已不及救舉家大慟嗚呼世之類此者亦多矣肉眼人見不到耳悲夫咸豐三年浙江紹興府有黎氏子無惡不作現生變為豬其家送至雲棲下院放生許蔭庭司馬親見之蓮西居士附識客曰見人殺生及捕魚鳥者雖發救度之願而力不從心奈何答曰見殺生者默持一切神呪或稱阿彌陀佛名號代物發懺悔心則被殺之物自然受益見捕魚鳥者專注其人不起別念默念南無多寶如來數十聲魚鳥皆可逃網矣此法屢試屢驗萬勿輕忽釋葷血禱神之疑三問客曰禱神者或求生子延壽或求功名財貨舍牲牷無以明敬奈何答曰天地神明好生惡殺使物類無子而求子減壽以求壽喪命而求名利無論天理不容自心亦大不忍矣非徒無益而又害之客曰凡持齊者祭可用素若出自食肉之家慢神甚矣答曰易有云東鄰殺牛不如西鄰之禴祭實受其福傳有云㵎溪沼沚之毛蘋繁薀藻之菜可薦于鬼神豈在天之靈而與人爭肉食耶客曰血食之神復墮地獄信有之乎答曰宿世正直故為神明就正直中慈心勝者不受血食正直中嗔心勝者必受血食慈心勝者慧勝於福報滿不至沉淪嗔心勝者福勝於慧報滿難免墮落可知上天好生不獨人宜體之也釋享親祭祖之疑四問客曰為祀神殺生固知不可矣為養親殺生不知亦有罪否答曰殆有甚焉禮有云善則歸親過則歸己人子之道也己則不殺獨為養親而殺是歸過于親矣於心忍乎或不得已用三淨肉不見殺不聞殺不為己殺是為三淨肉及自死肉奉之是或兩全之道也客曰人子報本莫重於祭父母生不持齊沒而用素不順乎親矣答曰倘謂祖先藉祭而飽則一歲設祭不過數次不其餒而若謂餒不餒不係乎此則祭亦不過人子之心耳豈宰割造業而可謂盡心乎且孝子養親猶需仁人之粟殺物命而登鼎爼纍父母多生業障何不仁如是客曰子孫設祭祖宗來享乎抑不來享乎答曰據中阿含經說祖宗若生鬼道子孫能以精誠致之則來享若在天道以受樂故不肯來享若在三途以受苦故不能來享若生人道別有六親不復來享為子孫者但當誠其意敬其事勿恣殺以重亡者之過勿忘齊以亂臨祭之心斯可矣不必問祖宗之來享否也客曰梁武帝以麵為犧牲作史者論為不血食之兆故知祀先用素非禮也答曰人之過也各於其黨觀過則仁可知梁武帝殺六貴灌壽陽城是其不仁也若以麵牲而論則在神免血食之愆在物獲全生之幸正其仁也至於天下之失乃國運使然耳如以麵牲之故則陳隋諸君豈不用太牢何亡之速耶蓮大師曰作俑者象人以葬孔子斥為無後則象牲以祭仁人猶不能滿焉必欲舍似用真何其忍哉按梁武帝即位後斷酒禁肉休民息兵頻書大有自晉至隋稱小康者莫如梁武享國四十九年壽八十有六厥後子孫仕唐八葉宰相唐書史臣以其奉佛沒其所長任意詆毀豈善善從長之意乎釋燕賓違俗之疑一問客曰親朋在座蔬食不可成歡勝友相招嘉肴方足明禮為愛物而廢燕享非通論也答曰其人而為善士則必喜我戒殺而不嫉我之慢其人而嫉我之慢必養口體之小人慢之亦無不可冒重罪以奉他人之口吾弗為之矣昔蘇東坡燕客岐亭以詩贈陳季常曰我哀籃中蛤開口護殘汁又哀籃中魚開口吐微濕刳腸彼交痛過分我何得相逢未寒溫相勸此最急不見盧懷慎蒸壺似蒸鴨坐客皆忍笑髠然發其羃不見王武子每食刀几赤琉璃載蒸豚中有人乳白盧公信寒陋衰鬢得滿幘武子雖豪舉未死神先泣先生萬金璧護此一蟻缺一年成一夢百歲真過客君無廢此篇嚴詩編杜集夫以東坡宴集尚殷殷戒殺如此子又何疑於燕賓違俗耶釋古聖教殺之疑二問客曰伏羲制網𮊁以佃以漁然則伏羲非與答曰洪荒之世鳥獸繁殖不為之防人受其害伏羲或教民禦之而未明言食之也若謂教民殺生吾恐漁舟無賴皆為伏羲功臣而解網縱禽饋魚使畜諸聖賢反開罪不淺矣客曰孔子戒殺不過不綱不射宿耳未嘗廢釣弋也若并戒之則仲尼不足法與答曰此蓋極言聖人愛物之仁耳以記事之書法而論釣者所以引其不綱弋者所以引其不射宿非謂聖人真釣弋也若謂因養與祭而釣弋豈孔子疏食飲水之風並非真樂蔬食菜羮之祭盡屬虗言乎甚矣測聖人者亦淺矣釋仁民愛物之疑二問客曰君子親親而仁民仁民而愛物施之有序戒殺放生務其末矣答曰孟子所言是親疏次第不是先後次第若必盡此而後及彼則幼失父母而有志仁民未及事君而慈心愛物反得罪於君父矣孟子豈作此執滯之論乎客又問答曰正為仁民之故勸人愛物子之愛人也以口腹仁民之小者也豫之愛人也以心志仁民之大者也釋因果差別之疑六問為不雜心要寂寂寂寂則善惡念不生心要惺惺惺惺則無記念不生佛外無念故常寂寂念中有佛故常惺惺不住持名不住者即是觀也觀者慧之機也前一句過去矣後一句未來也中一句亦不住前一句過去矣後一句未來也現在一句亦不住了了分明而不可得不可得而了了分明即禪即佛持名或看一話頭者謂之參禪或坐而息念者謂之坐禪參也坐也總是禪也禪也佛也總是心也禪即佛之禪佛即禪之佛念佛法門何礙於參禪坐禪乎且參禪者能將此阿彌陀佛四字當做一句話頭念來念去反覆不捨不言參禪禪在其中矣坐禪者要到一念相應豁然如托空方為得手念佛念到一心不亂時非相應乎念到心空時非永遠相應乎於念佛時不昏不散止觀定慧念念圓成若欲別求禪那禪當更在何處即戒即佛持名持佛戒以治身也持佛名以治心也持之久而心純持之久而心空念性戒性非有二也板板持戒不得出頭板板念佛則臨命終時打破鬼關跳出三界矣若奉戒已有工夫即以之回向西方必生中品若未能兼顧者且勤念佛如救頭燃即教即佛持名一大藏經皆從心起心若無佛教亦徒然然心中亦何人無佛哉自不念耳教下未有不看楞嚴者也看楞嚴未有不輕勢至而重觀音者也即此一見已成生死根本縱學得種種知能不過滋潤苦芽生死關頭總不得力願速放下往生西方親覲彌陀若不能放下即將此學經演說功德回向西方發四宏願亦不唐捐若宏揚淨土一門詳說念佛功德則舉目動念皆是莊嚴西方上品往生更復何疑不持而持一事才完一語才罷尚未打點念佛而四字佛名滾滾出來此三昧易成之象也持而不持持名不懈快足又快足於念佛時明明持此四字念頭不轉而四字忽然一停亦非有即四字之念亦非有離四字之念亦非有四字以外之念此謂暫得勝境非真心空也然勤勤念佛此境屢現則漸漸心空若因一念心空遂逐昏沉是謂無慧當知心愈空則念愈靈心愈空則念愈淨以佛心中之我念我心中之佛空與不空更在何處譬如日與月赫濯乘寶宮旋繞須彌山周流照天下噫此何如妙覺圓明哉孤身持名比丘修道不求伴侶念佛之境孤寂最佳高低有宜緩急隨分打成一片正在此時當知身孤而心不孤也諸佛及彌陀之心未嘗暫捨乎我舉意佛知開口佛聞何憂孤寂乎若淨土法門未能了了須多購淨土書讀之如彌陀經觀經智者大師十疑論天如則禪師淨土或問大佑禪師淨土指歸龍舒淨土文淨土晨鐘西方公據西方確指雲栖法彙彌陀疏鈔等書宜勤披閲此姑舉明白易曉者言之此外尚美不勝舉也訪通曉淨土者叩問之結期持名福薄耳答曰食肉是君祿不食是君福持齊戒殺正是積福耳豈以八口即名福耶客曰信斯言也必持齊而後可吾不知孔子亦持齊否答曰書云齊必變食又曰子之所慎齊禮言致齊於內散齊於外班班可考今人事事不能如孔子而獨藉口於食肉法孔子豈孔子尚為肉食者鄙耶客曰持齊固善矣其如形容枯槁奈何答曰真身為重假身為輕且神明賞罰論人之形容乎抑論人之心術乎弗思而已客曰世間五種辛本地中所生佛經何為一並戒之答曰經言為其辛臭故能障菩提故諸天厭棄故熟食助淫生食發嗔故邪魔餓鬼嘗嗅其唇故客曰有人謂吾雖不持齊猶勝于持齊而破有人謂吾雖持齊而破猶勝于不持何如答曰譬如仕宦其不持齊者未曾出仕者也持之而破者既仕而被黜者也何優何劣客曰吾亦欲持齊無如美味當前便不能自主奈何答曰上根人發無量慈心自不忍食否則作五不淨想則決定能持齊矣一者彼種子不淨二者彼所食不淨三者彼住處不淨四者彼腹不淨五者彼死後不淨常作此想何不能持齊之有釋佛理難信之疑三問客曰諸佛菩薩救苦尋聲梁武帝奉佛其後餓死臺城何故答曰餓死臺城此迂儒之說也通鑑載侯景攻陷臺城見梁武帝神色不變不敢仰視退告王僧貴有天威難犯不敢再見之語後王綸上雞子數百枚武帝口苦索蜜不得再曰荷荷遂殂夫曰口苦則非枵腹可知求蜜則非療飢可知且雞子至數百枚則他物必稱是矣焉有餓死之理噫天下讀史者每稱獨具隻眼獨此一段史文不覺以耳代目甚矣習染之深也客曰後之論者皆謂武帝捨身並其天下捨之吾是以不取焉答曰古今聖凡未有不捨其身者只如足下今日深以阿㖿二字不知何往矣善哉此病中之精進者也臨終持名但記取阿彌陀佛四字勿忘也能高念便高念能低念便低念或高低皆不能亦宜將四字默記於心不令忘失左右侍奉之人亦宜常將此四字頻頻提醒當知百劫千生所有亂走之路全在此時一念斷得清楚何以故六道輪回皆一念為主若一念專注在佛則形雖敗壞而神不散亂即隨一念而往生淨土矣嗚呼但記取阿彌陀佛四字勿忘也發願懺悔持名嗚呼世之不知念佛者衆矣儒中人擯佛為異端而不肯念出家人以念佛為故套而不知所以念狂慧者知有佛而不屑念愚癡者不知佛而不能念此大較也即間有村愚夫婦聞說因果亦知念佛而又希求來生得受福報依舊為輪回種子求一為了生死而念佛者百中少有一二也須知人既念佛則當心佛慈心行佛悲行發廣大願濟度衆生一切衆垢冤纏普為懺悔一切巨細功德回向西方如此乃為念佛之正因也
